services:
  db:
    image: postgres:16-alpine
    container_name: flowtrack-db
    environment:
      POSTGRES_DB: flowtrack
      POSTGRES_USER: flowtrack
      POSTGRES_PASSWORD: flowtrack
    ports:
      - "${FLOWTRACK_DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowtrack"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLOWTRACK_DATABASE_URL: postgresql://flowtrack:flowtrack@db:5432/flowtrack
    entrypoint: ["uv", "run", "alembic", "upgrade", "head"]

volumes:
  pgdata:
